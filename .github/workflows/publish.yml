name: Publish Node

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm OIDC Trusted Publishing and provenance
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Map secret to job env to allow step conditional evaluation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish to npm (OIDC Trusted Publishing)
        if: "${{ env.NPM_TOKEN == '' }}"
        run: npm publish --provenance --access public

      - name: Publish to npm (Token Fallback)
        if: "${{ env.NPM_TOKEN != '' }}"
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
